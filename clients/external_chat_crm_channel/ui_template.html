<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{safe_title}</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap");
    :root {{
{theme_vars_css}
      --shell: #f4f8ff;
      --glass: rgba(255, 255, 255, 0.74);
      --shadow-strong: 0 34px 76px rgba(14, 34, 61, 0.18);
      --shadow-soft: 0 14px 28px rgba(14, 34, 61, 0.12);
      --shadow-chip: 0 8px 18px rgba(14, 34, 61, 0.1);
    }}
    * {{ box-sizing: border-box; }}
    body {{
      margin: 0;
      background:
        radial-gradient(circle at 9% -12%, #cadeff 0%, rgba(202, 222, 255, 0) 42%),
        radial-gradient(circle at 98% 118%, #cbffe8 0%, rgba(203, 255, 232, 0) 36%),
        linear-gradient(180deg, #f8fbff 0%, #ebf2fb 100%);
      color: var(--text);
      font: 14px/1.52 "Manrope", "Trebuchet MS", "Verdana", sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      isolation: isolate;
      padding: 16px;
    }}
    body::before {{
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.35) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.35) 1px, transparent 1px);
      background-size: 36px 36px;
      opacity: 0.38;
    }}
    .wrap {{
      width: 100%;
      max-width: 900px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.98) 0%, rgba(246, 250, 255, 0.94) 100%);
      border: 1px solid rgba(181, 199, 223, 0.54);
      border-radius: 26px;
      overflow: hidden;
      box-shadow: var(--shadow-strong);
      position: relative;
      backdrop-filter: blur(10px);
    }}
    .wrap::before {{
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 112px;
      pointer-events: none;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.62) 0%, rgba(255, 255, 255, 0) 100%);
    }}
    .head {{
      padding: 18px 20px;
      border-bottom: 1px solid rgba(181, 199, 223, 0.54);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.96) 0%, rgba(241, 248, 255, 0.82) 100%);
      backdrop-filter: blur(12px);
      position: relative;
    }}
    .head::after {{
      content: "";
      position: absolute;
      left: 20px;
      right: 20px;
      bottom: 0;
      height: 1px;
      background: linear-gradient(90deg, rgba(104, 141, 184, 0), rgba(104, 141, 184, 0.38), rgba(104, 141, 184, 0));
    }}
    .title {{
      font: 700 18px/1.2 "Space Grotesk", "Manrope", sans-serif;
      letter-spacing: 0.25px;
    }}
    .status {{
      color: #5e718d;
      font-size: 11px;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 7px 11px;
      border-radius: 999px;
      border: 1px solid rgba(181, 199, 223, 0.62);
      background: var(--glass);
      text-transform: uppercase;
      letter-spacing: 0.4px;
      box-shadow: var(--shadow-chip);
    }}
    .status::before {{
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #2fc368;
      box-shadow: 0 0 0 4px rgba(47, 195, 104, 0.18);
    }}
    .history {{
      padding: 20px 20px;
      overflow-y: auto;
      background:
        radial-gradient(circle at 9% 0%, rgba(255, 255, 255, 0.84) 0%, rgba(255, 255, 255, 0) 40%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.42) 0%, rgba(255, 255, 255, 0.12) 100%),
        var(--bg);
      min-height: 380px;
      max-height: 60vh;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }}
    .history::-webkit-scrollbar {{
      width: 10px;
    }}
    .history::-webkit-scrollbar-track {{
      background: transparent;
    }}
    .history::-webkit-scrollbar-thumb {{
      background: rgba(52, 75, 102, 0.22);
      border-radius: 999px;
      border: 2px solid transparent;
      background-clip: padding-box;
    }}
    .msg {{
      max-width: 82%;
      padding: 11px 13px;
      border-radius: 18px;
      border: 1px solid rgba(181, 199, 223, 0.62);
      white-space: pre-wrap;
      word-break: break-word;
      animation: rise .18s cubic-bezier(0.2, 0.8, 0.2, 1);
      box-shadow: var(--shadow-soft);
      line-height: 1.48;
      position: relative;
    }}
    .msg.mine {{
      margin-left: auto;
      background: linear-gradient(180deg, rgba(231, 243, 255, 0.96) 0%, rgba(219, 237, 255, 0.96) 100%);
      border-bottom-right-radius: 8px;
    }}
    .msg.other {{
      margin-right: auto;
      background: linear-gradient(180deg, rgba(241, 244, 249, 0.96) 0%, rgba(235, 240, 246, 0.96) 100%);
      border-bottom-left-radius: 8px;
    }}
    .msg.system {{
      margin: 0 auto;
      background: var(--system);
      max-width: 96%;
      border-style: dashed;
      text-align: center;
    }}
    .msg.mine::after {{
      content: "";
      position: absolute;
      right: -6px;
      bottom: 10px;
      width: 12px;
      height: 12px;
      border-right: 1px solid rgba(181, 199, 223, 0.62);
      border-top: 1px solid rgba(181, 199, 223, 0.62);
      background: rgba(219, 237, 255, 0.96);
      transform: rotate(45deg);
      border-radius: 2px;
    }}
    .msg.other::after {{
      content: "";
      position: absolute;
      left: -6px;
      bottom: 10px;
      width: 12px;
      height: 12px;
      border-left: 1px solid rgba(181, 199, 223, 0.62);
      border-bottom: 1px solid rgba(181, 199, 223, 0.62);
      background: rgba(235, 240, 246, 0.96);
      transform: rotate(45deg);
      border-radius: 2px;
    }}
    .msg.system::after {{
      display: none;
    }}
    .meta {{
      margin-top: 6px;
      color: var(--muted);
      font-size: 10px;
      letter-spacing: 0.28px;
      text-transform: uppercase;
    }}
    .onboarding-card {{
      width: min(100%, 620px);
      margin: 0 auto;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: var(--shadow-soft);
      animation: rise .18s cubic-bezier(0.2, 0.8, 0.2, 1);
    }}
    .onboarding-title {{
      margin: 0;
      font: 700 15px/1.2 "Space Grotesk", "Manrope", sans-serif;
      letter-spacing: 0.18px;
    }}
    .onboarding-note {{
      margin: 6px 0 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }}
    .onboarding-form {{
      margin-top: 12px;
      display: grid;
      gap: 10px;
    }}
    .onboarding-field {{
      display: grid;
      gap: 6px;
      text-align: left;
    }}
    .onboarding-label {{
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 0.28px;
      text-transform: uppercase;
    }}
    .onboarding-field input {{
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 11px;
      padding: 10px 11px;
      font: inherit;
      color: var(--text);
      background: #fff;
      transition: border-color .18s ease, box-shadow .18s ease;
    }}
    .onboarding-field input:focus {{
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(10, 102, 194, 0.12);
    }}
    .onboarding-field input.input-error {{
      border-color: #d64545;
      box-shadow: 0 0 0 3px rgba(214, 69, 69, 0.12);
    }}
    .onboarding-error {{
      color: #bf2d2d;
      font-size: 11px;
      line-height: 1.25;
    }}
    .onboarding-submit {{
      border: 0;
      border-radius: 12px;
      min-height: 40px;
      padding: 0 16px;
      background: var(--accent);
      color: #fff;
      font: 700 13px/1 "Space Grotesk", "Manrope", sans-serif;
      letter-spacing: 0.2px;
      cursor: pointer;
      box-shadow: 0 9px 18px rgba(10, 102, 194, 0.22);
      transition: transform .14s ease, box-shadow .14s ease, filter .14s ease;
    }}
    .onboarding-submit:hover:not(:disabled) {{
      transform: translateY(-1px);
      filter: brightness(1.04);
      box-shadow: 0 12px 22px rgba(10, 102, 194, 0.27);
    }}
    .onboarding-submit:disabled {{
      opacity: .65;
      cursor: default;
      box-shadow: none;
    }}
    .rating-box {{
      border-top: 1px solid var(--line);
      padding: 10px 14px;
      background: rgba(255, 255, 255, 0.93);
      display: grid;
      gap: 8px;
    }}
    .rating-text {{
      color: var(--text);
      font-size: 13px;
      line-height: 1.4;
    }}
    .rating-actions {{
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }}
    .rating-btn {{
      border: 1px solid var(--line);
      border-radius: 10px;
      min-width: 40px;
      height: 34px;
      padding: 0 10px;
      background: #fff;
      color: var(--text);
      font: 700 12px/1 "Space Grotesk", "Manrope", sans-serif;
      cursor: pointer;
      transition: border-color .14s ease, transform .14s ease, box-shadow .14s ease;
    }}
    .rating-btn:hover:not(:disabled) {{
      border-color: var(--accent);
      transform: translateY(-1px);
      box-shadow: 0 8px 14px rgba(10, 102, 194, 0.14);
    }}
    .rating-btn.active {{
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }}
    .rating-btn:disabled {{
      opacity: .55;
      cursor: default;
      box-shadow: none;
      transform: none;
    }}
    .composer {{
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 10px;
      align-items: end;
      border-top: 1px solid rgba(181, 199, 223, 0.56);
      padding: 12px 14px 14px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.98) 0%, rgba(244, 249, 255, 0.93) 100%);
    }}
    .attach-btn {{
      border: 1px solid rgba(181, 199, 223, 0.62);
      border-radius: 14px;
      width: 42px;
      height: 42px;
      padding: 0;
      background: #fff;
      color: #667b99;
      font: 700 21px/1 "Space Grotesk", "Manrope", sans-serif;
      cursor: pointer;
      transition: border-color .14s ease, color .14s ease, transform .14s ease, box-shadow .14s ease;
    }}
    .attach-btn:hover:not(:disabled) {{
      border-color: var(--accent);
      color: var(--accent);
      transform: translateY(-1px);
      box-shadow: 0 8px 16px rgba(10, 102, 194, 0.12);
    }}
    .attach-btn:disabled {{
      opacity: .5;
      cursor: default;
      transform: none;
      box-shadow: none;
    }}
    .composer textarea {{
      grid-column: 2;
      width: 100%;
      min-height: 44px;
      max-height: 136px;
      resize: none;
      border: 1px solid rgba(181, 199, 223, 0.62);
      border-radius: 14px;
      padding: 11px 12px;
      font: inherit;
      color: var(--text);
      background: rgba(255, 255, 255, 0.98);
      transition: border-color .18s ease, box-shadow .18s ease, background-color .18s ease;
    }}
    .composer textarea:focus {{
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(10, 102, 194, 0.14);
      background: #fff;
    }}
    .send-btn {{
      grid-column: 3;
      border: 0;
      border-radius: 14px;
      min-width: 112px;
      padding: 0 18px;
      background: linear-gradient(180deg, #2a80d1 0%, var(--accent) 100%);
      color: #fff;
      font: 700 13px/1 "Space Grotesk", "Manrope", sans-serif;
      letter-spacing: 0.2px;
      cursor: pointer;
      box-shadow: 0 10px 20px rgba(10, 102, 194, 0.24);
      transition: transform .14s ease, box-shadow .14s ease, filter .14s ease;
    }}
    .send-btn:hover:not(:disabled) {{
      transform: translateY(-1px);
      filter: brightness(1.04);
      box-shadow: 0 13px 24px rgba(10, 102, 194, 0.28);
    }}
    .send-btn:active:not(:disabled) {{
      transform: translateY(0);
    }}
    .send-btn:disabled {{
      opacity: .5;
      cursor: default;
      box-shadow: none;
    }}
    .attach-note {{
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      border: 1px solid rgba(181, 199, 223, 0.62);
      border-radius: 11px;
      padding: 7px 10px;
      color: var(--muted);
      font-size: 12px;
      background: rgba(255, 255, 255, 0.94);
    }}
    .attach-note-text {{
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-width: 0;
    }}
    .attach-clear {{
      border: 0;
      border-radius: 8px;
      min-height: 24px;
      padding: 0 8px;
      background: rgba(19, 32, 51, 0.08);
      color: var(--text);
      font: 700 11px/1 "Manrope", sans-serif;
      cursor: pointer;
    }}
    .attach-clear:disabled {{
      opacity: .5;
      cursor: default;
    }}
    @keyframes rise {{
      from {{ transform: translateY(10px) scale(.985); opacity: .32; }}
      to {{ transform: translateY(0) scale(1); opacity: 1; }}
    }}
    @media (max-width: 700px) {{
      body {{ padding: 10px; }}
      .wrap {{
        border-radius: 16px;
        min-height: calc(100vh - 20px);
      }}
      .head {{
        padding: 13px 14px;
      }}
      .title {{
        font-size: 15px;
      }}
      .history {{
        padding: 14px;
      }}
      .history {{ max-height: 56vh; min-height: 280px; }}
      .composer {{
        padding: 10px 12px;
      }}
      .send-btn {{
        min-width: 96px;
      }}
      .attach-note {{
        font-size: 11px;
      }}
    }}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="head">
      <div class="title">{safe_title}</div>
      <div class="status" id="status">connecting...</div>
    </div>
    <div class="history" id="history"></div>
    <div class="rating-box" id="ratingBox" hidden>
      <div class="rating-text" id="ratingText"></div>
      <div class="rating-actions" id="ratingActions"></div>
    </div>
    <form class="composer" id="composer">
      <button type="button" class="attach-btn" id="attachButton" title="Attach file">+</button>
      <textarea id="text" maxlength="{ExternalChatCrmChannelConfig.MAX_MESSAGE_LENGTH}" placeholder="Type your message"></textarea>
      <button type="submit" class="send-btn">Send</button>
      <input type="file" id="fileInput" hidden>
      <div class="attach-note" id="attachNote" hidden>
        <div class="attach-note-text" id="attachNoteText"></div>
        <button type="button" class="attach-clear" id="attachClear">Clear</button>
      </div>
    </form>
  </div>
  <script>
    const CONFIG = {{
      ci: "{safe_ci}",
      profileKey: "webchat:profile:{safe_ci}",
      visitorKey: "webchat:visitor:{safe_ci}",
      maxUploadBytes: {ExternalChatCrmChannelConfig.MAX_UPLOAD_FILE_SIZE_BYTES},
      required: {{
        display_name: {safe_require_display_name},
        phone: {safe_require_phone},
        email: {safe_require_email},
      }},
    }};
    const REQUIRED_ORDER = ["display_name", "phone", "email"];
    const FIELD_LABELS = {{
      display_name: "name",
      phone: "phone",
      email: "email",
    }};
    const FIELD_PLACEHOLDERS = {{
      display_name: "John Smith",
      phone: "+998 90 123 45 67",
      email: "name@example.com",
    }};
    const FIELD_INVALID = {{
      display_name: "Please enter a valid name.",
      phone: "Please enter a valid phone number.",
      email: "Please enter a valid email address.",
    }};

    const statusEl = document.getElementById("status");
    const historyEl = document.getElementById("history");
    const ratingBoxEl = document.getElementById("ratingBox");
    const ratingTextEl = document.getElementById("ratingText");
    const ratingActionsEl = document.getElementById("ratingActions");
    const attachButtonEl = document.getElementById("attachButton");
    const fileInputEl = document.getElementById("fileInput");
    const attachNoteEl = document.getElementById("attachNote");
    const attachNoteTextEl = document.getElementById("attachNoteText");
    const attachClearEl = document.getElementById("attachClear");
    const textEl = document.getElementById("text");
    const formEl = document.getElementById("composer");
    const sendButtonEl = formEl.querySelector(".send-btn");
    statusEl.textContent = "initializing...";

    const state = {{
      chatReady: false,
      ticketClosed: false,
      chatRevision: 0,
      pollTick: 0,
      visitorId: "",
      profile: {{
        display_name: "",
        phone: "",
        email: "",
      }},
      onboardingErrors: {{}},
      onboardingSubmitBusy: false,
      ratingEnabled: false,
      ratingRequired: false,
      ratingSubmitted: false,
      ticketRating: null,
      ratingMessage: "",
      ratingSubmitting: false,
      pendingFile: null,
      fileReading: false,
      lastHistoryFingerprint: "",
    }};

    function storageGet(key) {{
      try {{
        return localStorage.getItem(key);
      }} catch (_) {{
        return null;
      }}
    }}
    function storageSet(key, value) {{
      try {{
        localStorage.setItem(key, value);
        return true;
      }} catch (_) {{
        return false;
      }}
    }}

    function normalizeText(value, maxLen = 120) {{
      return String(value || "").trim().slice(0, maxLen);
    }}
    function normalizePhone(value) {{
      const digits = String(value || "").replace(/\D/g, "");
      return digits;
    }}
    function normalizeEmail(value) {{
      const email = String(value || "").trim().toLowerCase();
      if (!email || email.indexOf("@") < 1 || email.indexOf(" ") >= 0) {{
        return "";
      }}
      return email;
    }}
    function normalizeRating(value) {{
      const num = Number(value);
      if (!Number.isInteger(num) || num < 1 || num > 5) {{
        return null;
      }}
      return num;
    }}
    function normalizeFileName(value) {{
      const raw = String(value || "").trim();
      if (!raw) {{
        return "file.bin";
      }}
      const parts = raw.replace(/\\/g, "/").split("/");
      const name = String(parts[parts.length - 1] || "").trim();
      return name || "file.bin";
    }}
    function normalizeFileExtension(value) {{
      const raw = String(value || "").trim().toLowerCase().replace(/^\./, "");
      const cleaned = raw.replace(/[^a-z0-9]/g, "");
      return cleaned.slice(0, 20);
    }}
    function getExtensionFromFileName(fileName) {{
      const name = String(fileName || "");
      const idx = name.lastIndexOf(".");
      if (idx < 1 || idx >= name.length - 1) {{
        return "";
      }}
      return normalizeFileExtension(name.slice(idx + 1));
    }}
    function formatBytes(size) {{
      const value = Number(size || 0);
      if (!value) {{
        return "0 B";
      }}
      if (value < 1024) {{
        return value + " B";
      }}
      if (value < 1024 * 1024) {{
        return (value / 1024).toFixed(1) + " KB";
      }}
      return (value / (1024 * 1024)).toFixed(1) + " MB";
    }}
    function autoSizeTextarea() {{
      const minHeight = 44;
      const maxHeight = 136;
      textEl.style.height = "0px";
      const nextHeight = Math.min(Math.max(textEl.scrollHeight, minHeight), maxHeight);
      textEl.style.height = nextHeight + "px";
    }}
    function clearPendingFile() {{
      state.pendingFile = null;
      if (fileInputEl) {{
        fileInputEl.value = "";
      }}
      renderPendingFile();
    }}
    function renderPendingFile() {{
      const pending = state.pendingFile;
      if (!pending) {{
        attachNoteEl.hidden = true;
        attachNoteTextEl.textContent = "";
        attachClearEl.disabled = false;
        return;
      }}
      attachNoteEl.hidden = false;
      attachNoteTextEl.textContent = pending.name + " (" + formatBytes(pending.size) + ")";
      attachClearEl.disabled = state.fileReading;
    }}
    function readFileAsDataURL(file) {{
      return new Promise((resolve, reject) => {{
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || ""));
        reader.onerror = () => reject(new Error("Failed to read file"));
        reader.readAsDataURL(file);
      }});
    }}
    function normalizeVisitorId(value) {{
      const raw = String(value || "").trim();
      if (!raw) {{
        return "";
      }}
      const cleaned = raw.replace(/[^0-9a-zA-Z:_-]/g, "").replace(/^[:_-]+|[:_-]+$/g, "");
      return cleaned.slice(0, 120);
    }}
    function getFirstQueryValue(keys) {{
      const params = new URLSearchParams(window.location.search || "");
      for (const key of keys) {{
        const value = String(params.get(key) || "").trim();
        if (value) {{
          return value;
        }}
      }}
      return "";
    }}
    function loadProfile() {{
      try {{
        const raw = storageGet(CONFIG.profileKey);
        if (!raw) {{
          return;
        }}
        const payload = JSON.parse(raw);
        if (!payload || typeof payload !== "object") {{
          return;
        }}
        state.profile.display_name = normalizeText(payload.display_name, 120);
        state.profile.phone = normalizePhone(payload.phone);
        state.profile.email = normalizeEmail(payload.email);
      }} catch (_) {{}}
    }}
    function persistProfile() {{
      storageSet(CONFIG.profileKey, JSON.stringify(state.profile));
    }}
    function applyQueryProfileOverrides() {{
      const queryDisplayName = normalizeText(getFirstQueryValue(["display_name", "name", "full_name"]), 120);
      const queryPhone = normalizePhone(getFirstQueryValue(["phone", "phone_number", "tel"]));
      const queryEmail = normalizeEmail(getFirstQueryValue(["email", "mail"]));
      if (queryDisplayName) {{
        state.profile.display_name = queryDisplayName;
      }}
      if (queryPhone) {{
        state.profile.phone = queryPhone;
      }}
      if (queryEmail) {{
        state.profile.email = queryEmail;
      }}
    }}
    function initVisitorId() {{
      const queryVisitorId = normalizeVisitorId(
        getFirstQueryValue(["visitor_id", "visitor", "visitorId", "vid"])
      );
      const storedVisitorId = normalizeVisitorId(storageGet(CONFIG.visitorKey) || "");
      let visitorId = queryVisitorId || storedVisitorId;
      if (!visitorId) {{
        visitorId = normalizeVisitorId(
          (window.crypto && window.crypto.randomUUID)
            ? window.crypto.randomUUID()
            : ("v" + Date.now() + Math.random().toString(16).slice(2))
        );
      }}
      state.visitorId = visitorId;
      storageSet(CONFIG.visitorKey, visitorId);
    }}
    function getMissingRequiredFields() {{
      const required = CONFIG.required || {{}};
      const missing = [];
      for (const field of REQUIRED_ORDER) {{
        if (!required[field]) {{
          continue;
        }}
        if (!state.profile[field]) {{
          missing.push(field);
        }}
      }}
      return missing;
    }}
    function getRequiredProfileFields() {{
      const required = CONFIG.required || {{}};
      const fields = [];
      for (const field of REQUIRED_ORDER) {{
        if (required[field]) {{
          fields.push(field);
        }}
      }}
      return fields;
    }}
    function isOnboardingRequired() {{
      return !state.chatReady && getMissingRequiredFields().length > 0;
    }}
    function fieldLabel(field) {{
      return FIELD_LABELS[field] || field;
    }}
    function fieldPlaceholder(field) {{
      return FIELD_PLACEHOLDERS[field] || "";
    }}
    function fieldInvalid(field) {{
      return FIELD_INVALID[field] || ("Invalid " + fieldLabel(field) + ".");
    }}
    function fieldInputType(field) {{
      if (field === "email") {{
        return "email";
      }}
      if (field === "phone") {{
        return "tel";
      }}
      return "text";
    }}
    function normalizeProfileValue(field, value) {{
      if (field === "display_name") {{
        return normalizeText(value, 120);
      }}
      if (field === "phone") {{
        return normalizePhone(value);
      }}
      if (field === "email") {{
        return normalizeEmail(value);
      }}
      return normalizeText(value, 120);
    }}
    function toTime(ts) {{
      const value = Number(ts || 0);
      if (!value) return "";
      return new Date(value * 1000).toLocaleTimeString([], {{ hour: "2-digit", minute: "2-digit" }});
    }}
    function historyFingerprint(items) {{
      const list = Array.isArray(items) ? items : [];
      const chunks = [];
      for (const item of list) {{
        const id = String(item.id || "");
        const text = String(item.text || "");
        const edited = item.edited ? "1" : "0";
        const type = String(item.message_type || "");
        chunks.push(id + "|" + type + "|" + edited + "|" + text);
      }}
      return chunks.join("||");
    }}
    function isHistoryNearBottom() {{
      const delta = historyEl.scrollHeight - historyEl.scrollTop - historyEl.clientHeight;
      return delta <= 48;
    }}
    function buildMessageNode(item) {{
      const type = item.message_type || "Regular";
      const box = document.createElement("div");
      box.className = "msg " + (type === "System" ? "system" : (item.mine ? "mine" : "other"));

      const text = document.createElement("div");
      text.textContent = item.text || "";
      box.appendChild(text);

      const meta = document.createElement("div");
      meta.className = "meta";
      const who = type === "System" ? "system" : (item.mine ? "you" : "operator");
      const stamp = toTime(item.created_date);
      meta.textContent = who + (stamp ? ("  " + stamp) : "") + (item.edited ? " (edited)" : "");
      box.appendChild(meta);

      return box;
    }}
    function renderHistory(items, force = false) {{
      const list = Array.isArray(items) ? items : [];
      const fingerprint = historyFingerprint(list);
      if (!force && fingerprint === state.lastHistoryFingerprint) {{
        return;
      }}
      const stickToBottom = state.lastHistoryFingerprint === "" || isHistoryNearBottom();
      const prevTop = historyEl.scrollTop;
      historyEl.innerHTML = "";
      for (const item of list) {{
        historyEl.appendChild(buildMessageNode(item));
      }}
      if (stickToBottom) {{
        historyEl.scrollTop = historyEl.scrollHeight;
      }} else {{
        historyEl.scrollTop = prevTop;
      }}
      state.lastHistoryFingerprint = fingerprint;
    }}
    function renderRatingPanel() {{
      const visible = (
        state.chatReady
        && state.ticketClosed
        && !isOnboardingRequired()
        && (
          state.ratingRequired
          || (state.ratingSubmitted && normalizeRating(state.ticketRating) !== null)
        )
      );
      ratingBoxEl.hidden = !visible;
      ratingActionsEl.innerHTML = "";
      if (!visible) {{
        return;
      }}

      if (state.ratingSubmitted) {{
        const savedRating = normalizeRating(state.ticketRating);
        ratingTextEl.textContent = savedRating !== null
          ? ("Thanks for your feedback. Rating: " + savedRating + "/5")
          : "Thanks for your feedback.";
        return;
      }}

      ratingTextEl.textContent = String(state.ratingMessage || "").trim() || "Please rate this chat.";
      for (let rating = 1; rating <= 5; rating += 1) {{
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "rating-btn";
        btn.textContent = String(rating);
        btn.disabled = state.ratingSubmitting;
        btn.addEventListener("click", () => {{
          submitRating(rating).catch((error) => {{
            handleActionError(error);
          }});
        }});
        ratingActionsEl.appendChild(btn);
      }}
    }}
    async function submitRating(rating) {{
      const normalized = normalizeRating(rating);
      if (normalized === null || !state.chatReady || state.ratingSubmitting) {{
        return;
      }}
      state.ratingSubmitting = true;
      statusEl.textContent = "saving rating...";
      renderRatingPanel();
      updateComposerState();
      try {{
        const result = await callApi("set_rating", {{
          visitor_id: state.visitorId,
          rating: normalized,
          display_name: state.profile.display_name,
          email: state.profile.email,
          phone: state.profile.phone
        }});
        applyWriteState(result);
        await refreshHistory(true);
        statusEl.textContent = "thanks for your feedback";
      }} finally {{
        state.ratingSubmitting = false;
        renderRatingPanel();
        updateComposerState();
      }}
    }}
    async function submitOnboardingForm(event) {{
      event.preventDefault();
      if (state.onboardingSubmitBusy || state.chatReady) {{
        return;
      }}

      const form = event.currentTarget;
      const formData = new FormData(form);
      const requiredFields = getRequiredProfileFields();
      const errors = {{}};
      const updatedProfile = {{
        display_name: state.profile.display_name,
        phone: state.profile.phone,
        email: state.profile.email,
      }};

      for (const field of requiredFields) {{
        const rawValue = formData.get(field);
        const normalized = normalizeProfileValue(field, rawValue);
        if (!normalized) {{
          errors[field] = fieldInvalid(field);
          continue;
        }}
        updatedProfile[field] = normalized;
      }}

      state.onboardingErrors = errors;
      if (Object.keys(errors).length) {{
        const firstField = requiredFields.find((field) => errors[field]);
        statusEl.textContent = firstField ? errors[firstField] : "please fill required fields";
        renderOnboarding();
        updateComposerState();
        return;
      }}

      state.profile = updatedProfile;
      persistProfile();
      state.onboardingSubmitBusy = true;
      statusEl.textContent = "connecting...";
      renderOnboarding();
      updateComposerState();
      try {{
        await initChat();
      }} catch (error) {{
        state.chatReady = false;
        handleActionError(error);
      }} finally {{
        state.onboardingSubmitBusy = false;
        updateComposerState();
        if (isOnboardingRequired()) {{
          renderOnboarding();
        }}
      }}
    }}
    function renderOnboarding() {{
      if (!isOnboardingRequired()) {{
        return;
      }}

      const fields = getRequiredProfileFields();
      historyEl.innerHTML = "";

      const card = document.createElement("div");
      card.className = "onboarding-card";

      const title = document.createElement("h3");
      title.className = "onboarding-title";
      title.textContent = "Before we start, please fill the form";
      card.appendChild(title);

      const note = document.createElement("p");
      note.className = "onboarding-note";
      note.textContent = "These details are required to open a support conversation.";
      card.appendChild(note);

      const form = document.createElement("form");
      form.className = "onboarding-form";
      form.noValidate = true;
      form.addEventListener("submit", submitOnboardingForm);

      for (const field of fields) {{
        const fieldWrap = document.createElement("label");
        fieldWrap.className = "onboarding-field";

        const label = document.createElement("span");
        label.className = "onboarding-label";
        label.textContent = fieldLabel(field);
        fieldWrap.appendChild(label);

        const input = document.createElement("input");
        input.name = field;
        input.type = fieldInputType(field);
        input.autocomplete = field === "display_name" ? "name" : (field === "phone" ? "tel" : "email");
        input.placeholder = fieldPlaceholder(field);
        input.value = String(state.profile[field] || "");
        input.required = true;
        if (state.onboardingErrors[field]) {{
          input.classList.add("input-error");
        }}
        fieldWrap.appendChild(input);

        const error = state.onboardingErrors[field];
        if (error) {{
          const errorEl = document.createElement("div");
          errorEl.className = "onboarding-error";
          errorEl.textContent = error;
          fieldWrap.appendChild(errorEl);
        }}
        form.appendChild(fieldWrap);
      }}

      const submit = document.createElement("button");
      submit.type = "submit";
      submit.className = "onboarding-submit";
      submit.disabled = state.onboardingSubmitBusy;
      submit.textContent = state.onboardingSubmitBusy ? "Connecting..." : "Start chat";
      form.appendChild(submit);

      card.appendChild(form);
      historyEl.appendChild(card);
      historyEl.scrollTop = historyEl.scrollHeight;
      state.lastHistoryFingerprint = "__onboarding__";
    }}
    function updateComposerState() {{
      const onboardingMode = isOnboardingRequired() || state.onboardingSubmitBusy;
      const hardDisabled = onboardingMode;
      attachButtonEl.disabled = hardDisabled || state.fileReading;
      fileInputEl.disabled = hardDisabled || state.fileReading;
      attachClearEl.disabled = hardDisabled || state.fileReading;
      if (onboardingMode) {{
        textEl.disabled = true;
        sendButtonEl.disabled = true;
        sendButtonEl.textContent = "Locked";
        textEl.placeholder = "Fill the form above to start";
        renderPendingFile();
        return;
      }}
      textEl.disabled = false;
      sendButtonEl.disabled = state.fileReading;
      sendButtonEl.textContent = state.pendingFile ? "Send file" : "Send";
      textEl.placeholder = state.pendingFile ? "Add message (optional)" : "Type your message";
      renderPendingFile();
      autoSizeTextarea();
    }}

    const basePath = window.location.pathname.replace(/\/+$/g, "").replace(/\/+/g, "/");
    const externalUrl = basePath + "/external?ci=" + encodeURIComponent(CONFIG.ci);
    console.info("[external_chat] externalUrl:", externalUrl);

    async function callApi(action, data) {{
      const resp = await fetch(externalUrl, {{
        method: "POST",
        headers: {{ "Content-Type": "application/json" }},
        body: JSON.stringify({{ action, data }})
      }});
      const payload = await resp.json().catch(() => ({{}}));
      if (!resp.ok) {{
        const message = (
          (payload && payload.result && payload.result.description)
          || (payload && payload.description)
          || ("HTTP " + resp.status)
        );
        const error = new Error(message);
        error.status = resp.status;
        error.payload = payload || {{}};
        throw error;
      }}
      return payload;
    }}
    function applyWriteState(payload) {{
      if (payload && Number(payload.chat_revision) > 0) {{
        state.chatRevision = Number(payload.chat_revision);
      }}
      state.ratingEnabled = !!(payload && payload.rating_enabled === true);
      state.ratingRequired = !!(payload && payload.rating_required === true);
      state.ratingSubmitted = !!(payload && payload.rating_submitted === true);
      state.ticketRating = normalizeRating(payload && payload.ticket_rating);
      state.ratingMessage = String((payload && payload.rating_message) || "");
      state.ticketClosed = !!(payload && payload.ticket_closed === true);
      renderRatingPanel();
      updateComposerState();
    }}

    async function initChat() {{
      if (state.chatReady) {{
        return;
      }}
      const missing = getMissingRequiredFields();
      if (missing.length) {{
        statusEl.textContent = "fill required fields";
        renderOnboarding();
        updateComposerState();
        return;
      }}
      statusEl.textContent = "connecting...";
      const result = await callApi("init", {{
        visitor_id: state.visitorId,
        display_name: state.profile.display_name,
        email: state.profile.email,
        phone: state.profile.phone
      }});
      if (result.visitor_id && result.visitor_id !== state.visitorId) {{
        state.visitorId = normalizeVisitorId(result.visitor_id);
        storageSet(CONFIG.visitorKey, state.visitorId);
      }}
      state.chatReady = true;
      state.onboardingErrors = {{}};
      applyWriteState(result);
      renderHistory(result.history || [], true);
      statusEl.textContent = "online";
    }}

    async function refreshHistory(forceFull = false) {{
      if (!state.chatReady) {{
        return;
      }}
      const result = await callApi("history", {{
        visitor_id: state.visitorId,
        display_name: state.profile.display_name,
        email: state.profile.email,
        phone: state.profile.phone,
        known_revision: state.chatRevision,
        force_full: !!forceFull,
        limit: {ExternalChatCrmChannelConfig.DEFAULT_HISTORY_LIMIT}
      }});
      applyWriteState(result);
      if (result.history_changed !== false) {{
        renderHistory(result.history || []);
      }}
      statusEl.textContent = "online";
    }}
    async function sendChatMessage(text) {{
      if (!state.chatReady) {{
        await initChat();
      }}
      if (!state.chatReady) {{
        return;
      }}
      const result = await callApi("send_message", {{
        visitor_id: state.visitorId,
        text: text,
        display_name: state.profile.display_name,
        email: state.profile.email,
        phone: state.profile.phone
      }});
      applyWriteState(result);
      await refreshHistory(true);
    }}
    async function sendChatFile(payload) {{
      if (!payload) {{
        return;
      }}
      if (!state.chatReady) {{
        await initChat();
      }}
      if (!state.chatReady) {{
        return;
      }}
      const result = await callApi("send_file", {{
        visitor_id: state.visitorId,
        text: payload.text || "",
        file_name: payload.name,
        extension: payload.extension,
        data: payload.data,
        display_name: state.profile.display_name,
        email: state.profile.email,
        phone: state.profile.phone
      }});
      applyWriteState(result);
      await refreshHistory(true);
    }}
    function handleActionError(error) {{
      const payload = error && error.payload ? error.payload : {{}};
      const hasTicketState =
        payload
        && (Object.prototype.hasOwnProperty.call(payload, "ticket_closed")
          || Object.prototype.hasOwnProperty.call(payload, "can_write")
          || Object.prototype.hasOwnProperty.call(payload, "rating_enabled"));
      if (hasTicketState) {{
        applyWriteState(payload);
      }}
      statusEl.textContent = "error: " + (error && error.message ? error.message : "unexpected error");
    }}

    formEl.addEventListener("submit", async (event) => {{
      event.preventDefault();
      if (isOnboardingRequired() || state.onboardingSubmitBusy) {{
        return;
      }}
      const text = (textEl.value || "").trim();
      const pendingFile = state.pendingFile;
      if (!text && !pendingFile) {{
        return;
      }}
      try {{
        sendButtonEl.disabled = true;
        if (pendingFile) {{
          await sendChatFile({{
            text: text,
            name: pendingFile.name,
            extension: pendingFile.extension,
            data: pendingFile.data,
          }});
          clearPendingFile();
        }} else {{
          await sendChatMessage(text);
        }}
        textEl.value = "";
        autoSizeTextarea();
      }} catch (error) {{
        handleActionError(error);
      }} finally {{
        updateComposerState();
      }}
    }});
    attachButtonEl.addEventListener("click", () => {{
      if (attachButtonEl.disabled || state.fileReading) {{
        return;
      }}
      fileInputEl.click();
    }});
    attachClearEl.addEventListener("click", () => {{
      if (state.fileReading) {{
        return;
      }}
      clearPendingFile();
      updateComposerState();
    }});
    fileInputEl.addEventListener("change", async () => {{
      const file = fileInputEl.files && fileInputEl.files[0];
      if (!file) {{
        return;
      }}
      const maxUploadBytes = Number(CONFIG.maxUploadBytes || 0);
      if (maxUploadBytes > 0 && Number(file.size || 0) > maxUploadBytes) {{
        clearPendingFile();
        statusEl.textContent = "file is too large (max " + formatBytes(maxUploadBytes) + ")";
        updateComposerState();
        return;
      }}
      state.fileReading = true;
      updateComposerState();
      try {{
        const dataUrl = await readFileAsDataURL(file);
        const base64Payload = String(dataUrl || "").split(",", 2)[1] || "";
        if (!base64Payload) {{
          throw new Error("Failed to read file");
        }}
        const fileName = normalizeFileName(file.name || "file.bin");
        const extension = normalizeFileExtension(getExtensionFromFileName(fileName)) || "bin";
        state.pendingFile = {{
          name: fileName,
          extension: extension,
          data: base64Payload,
          size: Number(file.size || 0),
        }};
        statusEl.textContent = "file attached";
      }} catch (error) {{
        clearPendingFile();
        statusEl.textContent = "file error: " + (error && error.message ? error.message : "unexpected error");
      }} finally {{
        state.fileReading = false;
        updateComposerState();
      }}
    }});
    textEl.addEventListener("input", () => {{
      autoSizeTextarea();
    }});
    textEl.addEventListener("keydown", (event) => {{
      if (event.key !== "Enter") {{
        return;
      }}
      if (event.shiftKey || event.ctrlKey || event.metaKey || event.altKey || event.isComposing) {{
        return;
      }}
      event.preventDefault();
      formEl.requestSubmit();
    }});

    async function bootstrapChat() {{
      if (!window.fetch) {{
        throw new Error("Fetch API is not available in this browser");
      }}

      loadProfile();
      applyQueryProfileOverrides();
      persistProfile();
      initVisitorId();
      updateComposerState();
      autoSizeTextarea();

      if (isOnboardingRequired()) {{
        renderOnboarding();
        statusEl.textContent = "fill required fields";
      }} else {{
        await initChat();
      }}

      setInterval(() => {{
        state.pollTick += 1;
        if (state.chatReady) {{
          const forceFull = state.pollTick % 20 === 0;
          refreshHistory(forceFull).catch((error) => {{
            handleActionError(error);
          }});
        }} else if (isOnboardingRequired()) {{
          if (!historyEl.querySelector(".onboarding-card")) {{
            renderOnboarding();
          }}
        }} else {{
          initChat().catch((error) => {{
            state.chatReady = false;
            handleActionError(error);
          }});
        }}
        updateComposerState();
      }}, 3000);
      updateComposerState();
    }}

    bootstrapChat().catch((error) => {{
      state.chatReady = false;
      statusEl.textContent = "startup error";
      console.error("[external_chat] bootstrap failed:", error);
      handleActionError(error);
      updateComposerState();
    }});
  </script>
</body>
</html>
