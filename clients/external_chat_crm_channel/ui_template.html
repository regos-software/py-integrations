<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>{safe_title}</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  {style_block}
</head>
<body>
  <div class="wrap">
    <div class="head">
      <div class="head-title">
        <div class="title">{safe_title}</div>
        <div class="status" id="status" title="connecting..." aria-label="connecting..." data-tone="pending"></div>
      </div>
      <div class="head-right">
        <select id="languageSelect" class="lang-select" aria-label="Language">
          <option value="ru">RU</option>
          <option value="uz">UZ</option>
          <option value="en">EN</option>
        </select>
      </div>
    </div>
    <div class="history" id="history">
      <div class="rating-box" id="ratingBox" hidden>
        <div class="rating-text" id="ratingText"></div>
        <div class="rating-actions" id="ratingActions"></div>
      </div>
      <div class="composer-spacer" id="composerSpacer" aria-hidden="true"></div>
      <form class="composer" id="composer">
        <div class="composer-main">
          <button type="button" class="attach-btn" id="attachButton" title="Attach file">+</button>
          <textarea id="text" maxlength="{ExternalChatCrmChannelConfig.MAX_MESSAGE_LENGTH}" placeholder="Type your message"></textarea>
        </div>
        <div class="composer-tools" id="composerTools">
          <div class="format-tools">
            <button type="button" class="format-btn" data-format="list"><i class="fa-solid fa-list-ul"></i></button>
            <button type="button" class="format-btn" data-format="bold"><i class="fa-solid fa-bold"></i></button>
            <button type="button" class="format-btn" data-format="italic"><i class="fa-solid fa-italic"></i></button>
            <button type="button" class="format-btn" data-format="strike"><i class="fa-solid fa-strikethrough"></i></button>
            <button type="button" class="format-btn" data-format="code"><i class="fa-solid fa-code"></i></button>
            <button type="button" class="format-btn" data-format="quote"><i class="fa-solid fa-quote-right"></i></button>
          </div>
          <button type="button" class="emoji-btn" id="emojiButton"><i class="fa-regular fa-face-smile"></i></button>
          <button type="submit" class="send-btn"><i class="fa-solid fa-paper-plane"></i></button>
          <div class="emoji-panel" id="emojiPanel" hidden></div>
        </div>
        <input type="file" id="fileInput" hidden multiple>
      </form>
    </div>
  </div>
  <script>
    const I18N_BUNDLE = {safe_i18n_bundle};
    const CONFIG = {{
      ci: "{safe_ci}",
      profileKey: "webchat:profile:{safe_ci}",
      visitorKey: "webchat:visitor:{safe_ci}",
      langKey: "webchat:lang:{safe_ci}",
      maxUploadBytes: {ExternalChatCrmChannelConfig.MAX_UPLOAD_FILE_SIZE_BYTES},
      required: {{
        display_name: {safe_require_display_name},
        phone: {safe_require_phone},
        email: {safe_require_email},
      }},
    }};
    const REQUIRED_ORDER = ["display_name", "phone", "email"];
    const LANGUAGES = ["ru", "uz", "en"];
    const MARKDOWN_TAG_MARKERS = [
      ["**", "strong"],
      ["++", "u"],
      ["~~", "s"],
      ["__", "strong"],
      ["*", "em"],
      ["_", "em"],
    ];
    const MOBILE_BREAKPOINT = 700;

    const languageSelectEl = document.getElementById("languageSelect");
    const statusEl = document.getElementById("status");
    const historyEl = document.getElementById("history");
    const ratingBoxEl = document.getElementById("ratingBox");
    const ratingTextEl = document.getElementById("ratingText");
    const ratingActionsEl = document.getElementById("ratingActions");
    const composerSpacerEl = document.getElementById("composerSpacer");
    const attachButtonEl = document.getElementById("attachButton");
    const fileInputEl = document.getElementById("fileInput");
    const emojiButtonEl = document.getElementById("emojiButton");
    const emojiPanelEl = document.getElementById("emojiPanel");
    const formatButtons = Array.from(document.querySelectorAll(".format-btn"));
    const textEl = document.getElementById("text");
    const formEl = document.getElementById("composer");
    const sendButtonEl = formEl.querySelector(".send-btn");
    const COMPOSER_TOOL_LABELS = {{
      list: "List",
      bold: "Bold",
      italic: "Italic",
      strike: "Strikethrough",
      code: "Code",
      quote: "Quote",
      emoji: "Emoji",
    }};
    const EMOJI_PANEL_ITEMS = [
      "\uD83D\uDE00", "\uD83D\uDE01", "\uD83D\uDE02", "\uD83E\uDD23", "\uD83D\uDE0A",
      "\uD83D\uDE09", "\uD83D\uDE0D", "\uD83D\uDE18", "\uD83D\uDE0E", "\uD83E\uDD17",
      "\uD83E\uDD14", "\uD83D\uDE34", "\uD83D\uDE4C", "\uD83D\uDC4F", "\uD83D\uDC4D",
      "\uD83D\uDC4E", "\uD83E\uDD1D", "\uD83D\uDE4F", "\uD83C\uDF89", "\uD83D\uDD25",
      "\u2728", "\uD83D\uDCAF", "\u2764\uFE0F", "\uD83D\uDC99", "\uD83D\uDC9A",
      "\uD83E\uDDE1", "\uD83D\uDC9B", "\uD83D\uDCAC", "\uD83D\uDCCE", "\u2705",
      "\u2757", "\u2753", "\uD83D\uDE42", "\uD83D\uDE43", "\uD83E\uDD29",
      "\uD83D\uDE07", "\uD83D\uDE22", "\uD83D\uDE21", "\uD83E\uDD2F", "\uD83E\uDD0D",
    ];
    function setStatus(text, tone = "ok") {{
      const safeText = String(text || "").trim() || "...";
      const safeTone = ["ok", "pending", "warning", "error"].indexOf(String(tone || "")) >= 0
        ? String(tone)
        : "ok";
      statusEl.textContent = "";
      statusEl.dataset.tone = safeTone;
      statusEl.title = safeText;
      statusEl.setAttribute("aria-label", safeText);
    }}
    setStatus("...", "pending");

    const state = {{
      lang: "en",
      chatReady: false,
      ticketClosed: false,
      chatRevision: 0,
      visitorId: "",
      profile: {{
        display_name: "",
        phone: "",
        email: "",
      }},
      onboardingErrors: {{}},
      onboardingSubmitBusy: false,
      ratingEnabled: false,
      ratingRequired: false,
      ratingSubmitted: false,
      ticketRating: null,
      ratingMessage: "",
      ratingSubmitting: false,
      pendingFiles: [],
      fileReading: false,
      lastHistoryFingerprint: "",
      lastHistoryItems: [],
    }};

    function storageGet(key) {{
      try {{
        return localStorage.getItem(key);
      }} catch (_) {{
        return null;
      }}
    }}
    function storageSet(key, value) {{
      try {{
        localStorage.setItem(key, value);
        return true;
      }} catch (_) {{
        return false;
      }}
    }}
    function normalizeLanguageCode(value) {{
      const raw = String(value || "").trim().toLowerCase().replace("_", "-");
      if (!raw) {{
        return "";
      }}
      const direct = raw.split("-", 1)[0];
      if (LANGUAGES.indexOf(direct) >= 0) {{
        return direct;
      }}
      return "";
    }}
    function getBrowserLanguage() {{
      const lang = normalizeLanguageCode(
        (navigator && (navigator.language || (navigator.languages && navigator.languages[0]))) || ""
      );
      return lang || "en";
    }}
    function getCurrentLocaleDict() {{
      return (
        (I18N_BUNDLE && I18N_BUNDLE[state.lang])
        || (I18N_BUNDLE && I18N_BUNDLE.en)
        || {{}}
      );
    }}
    function t(key, params) {{
      const dict = getCurrentLocaleDict();
      const fallback = (I18N_BUNDLE && I18N_BUNDLE.en) || {{}};
      let text = String(dict[key] || fallback[key] || key);
      const vars = params && typeof params === "object" ? params : {{}};
      for (const [name, value] of Object.entries(vars)) {{
        const token = "{{" + String(name) + "}}";
        text = text.split(token).join(String(value));
      }}
      return text;
    }}
    function renderLanguageSwitcher() {{
      if (!languageSelectEl) {{
        return;
      }}
      const current = state.lang || "en";
      const labels = {{
        ru: t("language_ru"),
        uz: t("language_uz"),
        en: t("language_en"),
      }};
      languageSelectEl.innerHTML = "";
      for (const code of LANGUAGES) {{
        const option = document.createElement("option");
        option.value = code;
        option.textContent = labels[code] || code.toUpperCase();
        languageSelectEl.appendChild(option);
      }}
      languageSelectEl.value = current;
      languageSelectEl.title = t("language_label");
      languageSelectEl.setAttribute("aria-label", t("language_label"));
    }}
    function setLanguage(value, persist = true) {{
      const normalized = normalizeLanguageCode(value) || "en";
      state.lang = normalized;
      document.documentElement.lang = normalized;
      if (persist) {{
        storageSet(CONFIG.langKey, normalized);
      }}
      renderLanguageSwitcher();
      renderComposerToolLabels();
      updateComposerState();
      renderRatingPanel();
      if (state.chatReady && Array.isArray(state.lastHistoryItems) && state.lastHistoryItems.length) {{
        renderHistory(state.lastHistoryItems, true);
      }}
      if (isOnboardingRequired()) {{
        renderOnboarding();
      }}
    }}
    function initLanguage() {{
      const queryLang = normalizeLanguageCode(getFirstQueryValue(["lang", "locale", "language", "hl"]));
      const storedLang = normalizeLanguageCode(storageGet(CONFIG.langKey) || "");
      const resolved = queryLang || storedLang || getBrowserLanguage();
      setLanguage(resolved, true);
    }}

    function normalizeText(value, maxLen = 120) {{
      return String(value || "").trim().slice(0, maxLen);
    }}
    function normalizePhone(value) {{
      const digits = String(value || "").replace(/\D/g, "");
      return digits;
    }}
    function normalizeEmail(value) {{
      const email = String(value || "").trim().toLowerCase();
      if (!email || email.indexOf("@") < 1 || email.indexOf(" ") >= 0) {{
        return "";
      }}
      return email;
    }}
    function normalizeRating(value) {{
      const num = Number(value);
      if (!Number.isInteger(num) || num < 1 || num > 5) {{
        return null;
      }}
      return num;
    }}
    function normalizeFileName(value) {{
      const raw = String(value || "").trim();
      if (!raw) {{
        return "file.bin";
      }}
      const parts = raw.replace(/\\/g, "/").split("/");
      const name = String(parts[parts.length - 1] || "").trim();
      return name || "file.bin";
    }}
    function normalizeFileExtension(value) {{
      const raw = String(value || "").trim().toLowerCase().replace(/^\./, "");
      const cleaned = raw.replace(/[^a-z0-9]/g, "");
      return cleaned.slice(0, 20);
    }}
    function getExtensionFromFileName(fileName) {{
      const name = String(fileName || "");
      const idx = name.lastIndexOf(".");
      if (idx < 1 || idx >= name.length - 1) {{
        return "";
      }}
      return normalizeFileExtension(name.slice(idx + 1));
    }}
    function formatBytes(size) {{
      const value = Number(size || 0);
      if (!value) {{
        return "0 B";
      }}
      if (value < 1024) {{
        return value + " B";
      }}
      if (value < 1024 * 1024) {{
        return (value / 1024).toFixed(1) + " KB";
      }}
      return (value / (1024 * 1024)).toFixed(1) + " MB";
    }}
    function syncComposerSpacer(force = false) {{
      if (!composerSpacerEl || !formEl) {{
        return;
      }}
      const nextReserve = Math.max(Number(formEl.offsetHeight || 0), 0) + 8;
      const currentReserve = Number(composerSpacerEl.dataset.reserve || "0");
      if (!force && Math.abs(nextReserve - currentReserve) < 1) {{
        return;
      }}
      composerSpacerEl.style.height = nextReserve + "px";
      composerSpacerEl.dataset.reserve = String(nextReserve);
    }}
    function autoSizeTextarea() {{
      const minHeight = 44;
      const maxHeight = 136;
      textEl.style.height = "0px";
      const nextHeight = Math.min(Math.max(textEl.scrollHeight, minHeight), maxHeight);
      textEl.style.height = nextHeight + "px";
      syncComposerSpacer();
    }}
    function setComposerSelection(start, end) {{
      if (typeof textEl.setSelectionRange !== "function") {{
        return;
      }}
      const length = String(textEl.value || "").length;
      const safeStart = Math.max(0, Math.min(Number(start || 0), length));
      const safeEnd = Math.max(safeStart, Math.min(Number(end || safeStart), length));
      textEl.setSelectionRange(safeStart, safeEnd);
    }}
    function replaceComposerRange(start, end, replacement, selectionMode = "end") {{
      const value = String(textEl.value || "");
      const safeStart = Math.max(0, Math.min(Number(start || 0), value.length));
      const safeEnd = Math.max(safeStart, Math.min(Number(end || safeStart), value.length));
      const text = String(replacement || "");
      if (typeof textEl.setRangeText === "function") {{
        textEl.setRangeText(text, safeStart, safeEnd, selectionMode);
      }} else {{
        textEl.value = value.slice(0, safeStart) + text + value.slice(safeEnd);
        const caret = safeStart + text.length;
        setComposerSelection(caret, caret);
      }}
    }}
    function focusComposerInput() {{
      textEl.focus();
      autoSizeTextarea();
      scheduleViewportCssUpdate(0);
    }}
    function wrapComposerSelection(prefix, suffix, placeholder) {{
      const value = String(textEl.value || "");
      const start = Number(textEl.selectionStart || 0);
      const end = Number(textEl.selectionEnd || start);
      const safeStart = Math.max(0, Math.min(start, value.length));
      const safeEnd = Math.max(safeStart, Math.min(end, value.length));
      const hasSelection = safeEnd > safeStart;
      const selectedText = value.slice(safeStart, safeEnd);
      const seed = hasSelection ? selectedText : String(placeholder || "");
      const left = String(prefix || "");
      const right = String(suffix || "");
      replaceComposerRange(safeStart, safeEnd, left + seed + right, "end");
      if (!hasSelection && seed) {{
        const cursorStart = safeStart + left.length;
        setComposerSelection(cursorStart, cursorStart + seed.length);
      }}
      focusComposerInput();
    }}
    function prefixComposerSelectionLines(prefix) {{
      const value = String(textEl.value || "");
      const start = Number(textEl.selectionStart || 0);
      const end = Number(textEl.selectionEnd || start);
      const safeStart = Math.max(0, Math.min(start, value.length));
      const safeEnd = Math.max(safeStart, Math.min(end, value.length));
      const blockStart = Math.max(value.lastIndexOf("\n", Math.max(safeStart - 1, 0)) + 1, 0);
      let blockEnd = value.indexOf("\n", safeEnd);
      if (blockEnd < 0) {{
        blockEnd = value.length;
      }}
      const blockText = value.slice(blockStart, blockEnd);
      const lines = String(blockText || "").split("\n");
      const marker = String(prefix || "");
      const prefixed = lines.map((line) => marker + line).join("\n");
      replaceComposerRange(blockStart, blockEnd, prefixed, "preserve");
      setComposerSelection(blockStart, blockStart + prefixed.length);
      focusComposerInput();
    }}
    function insertComposerText(insertText) {{
      const value = String(textEl.value || "");
      const start = Number(textEl.selectionStart || 0);
      const end = Number(textEl.selectionEnd || start);
      const safeStart = Math.max(0, Math.min(start, value.length));
      const safeEnd = Math.max(safeStart, Math.min(end, value.length));
      const text = String(insertText || "");
      replaceComposerRange(safeStart, safeEnd, text, "end");
      focusComposerInput();
    }}
    function applyComposerTool(action) {{
      if (!action || textEl.disabled || sendButtonEl.disabled) {{
        return;
      }}
      if (action === "bold") {{
        wrapComposerSelection("**", "**", "bold");
        return;
      }}
      if (action === "italic") {{
        wrapComposerSelection("*", "*", "italic");
        return;
      }}
      if (action === "strike") {{
        wrapComposerSelection("~~", "~~", "text");
        return;
      }}
      if (action === "code") {{
        const selected = String(textEl.value || "").slice(
          Number(textEl.selectionStart || 0),
          Number(textEl.selectionEnd || 0)
        );
        if (selected.indexOf("\n") >= 0) {{
          wrapComposerSelection("```\n", "\n```", "code");
        }} else {{
          wrapComposerSelection("`", "`", "code");
        }}
        return;
      }}
      if (action === "quote") {{
        prefixComposerSelectionLines("> ");
        return;
      }}
      if (action === "list") {{
        prefixComposerSelectionLines("- ");
      }}
    }}
    function insertComposerEmoji(emoji) {{
      if (textEl.disabled || sendButtonEl.disabled) {{
        return;
      }}
      const icon = String(emoji || "").trim();
      if (!icon) {{
        return;
      }}
      const value = String(textEl.value || "");
      const start = Number(textEl.selectionStart || 0);
      const end = Number(textEl.selectionEnd || start);
      const leftChar = start > 0 ? value[start - 1] : "";
      const rightChar = end < value.length ? value[end] : "";
      const leftSpacer = leftChar && !/\s/.test(leftChar) ? " " : "";
      const rightSpacer = rightChar && !/\s/.test(rightChar) ? " " : "";
      insertComposerText(leftSpacer + icon + rightSpacer);
    }}
    function closeEmojiPanel() {{
      if (!emojiPanelEl || emojiPanelEl.hidden) {{
        return;
      }}
      emojiPanelEl.hidden = true;
      if (emojiButtonEl) {{
        emojiButtonEl.setAttribute("aria-expanded", "false");
      }}
    }}
    function ensureEmojiPanelContent() {{
      if (!emojiPanelEl || emojiPanelEl.childElementCount > 0) {{
        return;
      }}
      for (const item of EMOJI_PANEL_ITEMS) {{
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "emoji-item";
        btn.textContent = item;
        btn.setAttribute("aria-label", item);
        btn.addEventListener("click", () => {{
          insertComposerEmoji(item);
          closeEmojiPanel();
        }});
        emojiPanelEl.appendChild(btn);
      }}
    }}
    function toggleEmojiPanel() {{
      if (!emojiPanelEl || !emojiButtonEl) {{
        return;
      }}
      if (emojiButtonEl.disabled || textEl.disabled || sendButtonEl.disabled) {{
        closeEmojiPanel();
        return;
      }}
      ensureEmojiPanelContent();
      const shouldOpen = !!emojiPanelEl.hidden;
      emojiPanelEl.hidden = !shouldOpen;
      emojiButtonEl.setAttribute("aria-expanded", shouldOpen ? "true" : "false");
      if (shouldOpen) {{
        focusComposerInput();
      }}
    }}
    function renderComposerToolLabels() {{
      for (const button of formatButtons) {{
        const action = String((button && button.dataset && button.dataset.format) || "");
        const label = COMPOSER_TOOL_LABELS[action] || action || "Tool";
        button.title = label;
        button.setAttribute("aria-label", label);
      }}
      if (emojiButtonEl) {{
        const emojiLabel = COMPOSER_TOOL_LABELS.emoji || "Emoji";
        emojiButtonEl.title = emojiLabel;
        emojiButtonEl.setAttribute("aria-label", emojiLabel);
        emojiButtonEl.setAttribute("aria-haspopup", "true");
        emojiButtonEl.setAttribute("aria-expanded", "false");
      }}
    }}
    let viewportRafId = 0;
    let viewportTimerId = 0;
    let viewportBindingsReady = false;
    let lastViewportHeightCss = "";
    let lastKeyboardOffsetCss = "";
    function isMobileLayoutActive() {{
      if (window.matchMedia) {{
        return window.matchMedia("(max-width: " + MOBILE_BREAKPOINT + "px)").matches;
      }}
      return window.innerWidth <= MOBILE_BREAKPOINT;
    }}
    function isChatFieldFocused() {{
      const active = document.activeElement;
      if (!active || !active.closest) {{
        return false;
      }}
      if (active.tagName !== "INPUT" && active.tagName !== "TEXTAREA") {{
        return false;
      }}
      return !!active.closest(".wrap");
    }}
    function applyViewportCssVars(force = false) {{
      const root = document.documentElement;
      if (!root || !root.style) {{
        return;
      }}

      const layoutHeightRaw = Number(window.innerHeight || root.clientHeight || 0);
      const layoutHeight = Math.max(Math.round(layoutHeightRaw), 320);
      const vv = window.visualViewport || null;
      let viewportHeight = layoutHeight;
      let keyboardOffset = 0;

      if (vv && Number(vv.height) > 0) {{
        const visualHeight = Math.max(Math.round(Number(vv.height || 0)), 320);
        viewportHeight = visualHeight;
        const visualBottom = Number(vv.height || 0) + Number(vv.offsetTop || 0);
        const overlap = Math.max(Math.round(layoutHeight - visualBottom), 0);

        if (isMobileLayoutActive() && isChatFieldFocused() && overlap > 0 && Math.abs(layoutHeight - viewportHeight) <= 2) {{
          keyboardOffset = overlap;
        }}
      }}

      const nextViewportCss = viewportHeight + "px";
      const nextKeyboardCss = keyboardOffset + "px";
      if (force || nextViewportCss !== lastViewportHeightCss) {{
        root.style.setProperty("--app-vh", nextViewportCss);
        lastViewportHeightCss = nextViewportCss;
      }}
      if (force || nextKeyboardCss !== lastKeyboardOffsetCss) {{
        root.style.setProperty("--keyboard-offset", nextKeyboardCss);
        lastKeyboardOffsetCss = nextKeyboardCss;
      }}
    }}
    function scheduleViewportCssUpdate(delayMs = 0) {{
      if (viewportTimerId) {{
        clearTimeout(viewportTimerId);
        viewportTimerId = 0;
      }}
      const queueUpdate = () => {{
        if (viewportRafId) {{
          return;
        }}
        viewportRafId = window.requestAnimationFrame(() => {{
          viewportRafId = 0;
          applyViewportCssVars(false);
        }});
      }};
      if (delayMs > 0) {{
        viewportTimerId = window.setTimeout(() => {{
          viewportTimerId = 0;
          queueUpdate();
        }}, delayMs);
        return;
      }}
      queueUpdate();
    }}
    function keepComposerVisibleOnMobile() {{
      if (!isMobileLayoutActive()) {{
        return;
      }}
      if (!formEl || !isChatFieldFocused()) {{
        return;
      }}
      if (typeof formEl.scrollIntoView === "function") {{
        formEl.scrollIntoView({{ block: "end", inline: "nearest" }});
      }}
    }}
    function bindViewportHandlers() {{
      if (viewportBindingsReady) {{
        return;
      }}
      viewportBindingsReady = true;

      const onViewportChange = () => {{
        scheduleViewportCssUpdate(0);
      }};
      window.addEventListener("resize", onViewportChange, {{ passive: true }});
      window.addEventListener("orientationchange", () => {{
        scheduleViewportCssUpdate(120);
      }}, {{ passive: true }});
      document.addEventListener("focusin", () => {{
        scheduleViewportCssUpdate(80);
        keepComposerVisibleOnMobile();
      }}, true);
      document.addEventListener("focusout", () => {{
        scheduleViewportCssUpdate(140);
      }}, true);
      if (window.visualViewport) {{
        window.visualViewport.addEventListener("resize", onViewportChange, {{ passive: true }});
        window.visualViewport.addEventListener("scroll", onViewportChange, {{ passive: true }});
      }}
      applyViewportCssVars(true);
    }}
    let pendingFileSeq = 0;
    function buildPendingFileId() {{
      pendingFileSeq += 1;
      return "pf_" + Date.now() + "_" + pendingFileSeq;
    }}
    function isImageFileMeta(extension, mimeType) {{
      const ext = normalizeFileExtension(extension);
      const mime = String(mimeType || "").trim().toLowerCase();
      if (mime.startsWith("image/")) {{
        return true;
      }}
      return ["apng", "avif", "bmp", "gif", "heic", "heif", "ico", "jpeg", "jpg", "png", "svg", "webp"].indexOf(ext) >= 0;
    }}
    function revokePendingPreview(fileItem) {{
      if (!fileItem || !fileItem.preview_url || !window.URL || !window.URL.revokeObjectURL) {{
        return;
      }}
      try {{
        window.URL.revokeObjectURL(fileItem.preview_url);
      }} catch (_) {{}}
    }}
    function queuePendingFile(file) {{
      if (!file) {{
        return;
      }}
      const name = normalizeFileName(file.name || "file.bin");
      const extension = normalizeFileExtension(getExtensionFromFileName(name)) || "bin";
      const mimeType = String(file.type || "").trim().toLowerCase();
      const isImage = isImageFileMeta(extension, mimeType);
      let previewUrl = "";
      if (isImage && window.URL && window.URL.createObjectURL) {{
        try {{
          previewUrl = window.URL.createObjectURL(file);

      }};

      for (const field of requiredFields) {{
        const rawValue = formData.get(field);
        const normalized = normalizeProfileValue(field, rawValue);
        if (!normalized) {{
          errors[field] = fieldInvalid(field);
          continue;
        }}
        updatedProfile[field] = normalized;
      }}

      state.onboardingErrors = errors;
      if (Object.keys(errors).length) {{
        const firstField = requiredFields.find((field) => errors[field]);
        setStatus(firstField ? errors[firstField] : t("status_fill_required_fields"), "warning");
        renderOnboarding();
        updateComposerState();
        return;
      }}

      state.profile = updatedProfile;
      persistProfile();
      state.onboardingSubmitBusy = true;
      setStatus(t("status_connecting"), "pending");
      renderOnboarding();
      updateComposerState();
      try {{
        await initChat();
      }} catch (error) {{
        state.chatReady = false;
        handleActionError(error);
      }} finally {{
        state.onboardingSubmitBusy = false;
        updateComposerState();
        if (isOnboardingRequired()) {{
          renderOnboarding();
        }}
      }}
    }}
    function renderOnboarding() {{
      if (!isOnboardingRequired()) {{
        return;
      }}

      const fields = getRequiredProfileFields();
      historyEl.innerHTML = "";

      const card = document.createElement("div");
      card.className = "onboarding-card";

      const title = document.createElement("h3");
      title.className = "onboarding-title";
      title.textContent = t("onboarding_title");
      card.appendChild(title);

      const note = document.createElement("p");
      note.className = "onboarding-note";
      note.textContent = t("onboarding_note");
      card.appendChild(note);

      const form = document.createElement("form");
      form.className = "onboarding-form";
      form.noValidate = true;
      form.addEventListener("submit", submitOnboardingForm);

      for (const field of fields) {{
        const fieldWrap = document.createElement("label");
        fieldWrap.className = "onboarding-field";

        const label = document.createElement("span");
        label.className = "onboarding-label";
        label.textContent = fieldLabel(field);
        fieldWrap.appendChild(label);

        const input = document.createElement("input");
        input.name = field;
        input.type = fieldInputType(field);
        input.autocomplete = field === "display_name" ? "name" : (field === "phone" ? "tel" : "email");
        input.placeholder = fieldPlaceholder(field);
        input.value = String(state.profile[field] || "");
        input.required = true;
        if (state.onboardingErrors[field]) {{
          input.classList.add("input-error");
        }}
        fieldWrap.appendChild(input);

        const error = state.onboardingErrors[field];
        if (error) {{
          const errorEl = document.createElement("div");
          errorEl.className = "onboarding-error";
          errorEl.textContent = error;
          fieldWrap.appendChild(errorEl);
        }}
        form.appendChild(fieldWrap);
      }}

      const submit = document.createElement("button");
      submit.type = "submit";
      submit.className = "onboarding-submit";
      submit.disabled = state.onboardingSubmitBusy;
      submit.textContent = state.onboardingSubmitBusy ? t("onboarding_connecting") : t("onboarding_start");
      form.appendChild(submit);

      card.appendChild(form);
      historyEl.appendChild(card);
      historyEl.appendChild(composerSpacerEl);
      historyEl.appendChild(formEl);
      syncComposerSpacer(true);
      historyEl.scrollTop = historyEl.scrollHeight;
      state.lastHistoryFingerprint = "__onboarding__";
    }}
    function updateComposerState() {{
      const onboardingMode = isOnboardingRequired() || state.onboardingSubmitBusy;
      const hardDisabled = onboardingMode;
      attachButtonEl.title = t("attach_title");
      attachButtonEl.innerHTML = '<i class="fa-solid fa-paperclip"></i>';
      attachButtonEl.disabled = hardDisabled || state.fileReading;
      fileInputEl.disabled = hardDisabled || state.fileReading;
      for (const button of formatButtons) {{
        button.disabled = hardDisabled || state.fileReading;
      }}
      if (emojiButtonEl) {{
        emojiButtonEl.disabled = hardDisabled || state.fileReading;
      }}
      if (hardDisabled || state.fileReading) {{
        closeEmojiPanel();
      }}
      const pendingCount = Array.isArray(state.pendingFiles) ? state.pendingFiles.length : 0;
      if (onboardingMode) {{
        textEl.disabled = true;
        sendButtonEl.disabled = true;
        sendButtonEl.innerHTML = '<i class="fa-solid fa-lock"></i>';
        sendButtonEl.removeAttribute("data-count");
        sendButtonEl.title = t("composer_locked");
        sendButtonEl.setAttribute("aria-label", t("composer_locked"));
        textEl.placeholder = t("composer_placeholder_fill");
        syncComposerSpacer();
        return;
      }}
      textEl.disabled = false;
      sendButtonEl.disabled = state.fileReading;
      sendButtonEl.innerHTML = '<i class="fa-solid fa-paper-plane"></i>';
      if (pendingCount > 0) {{
        sendButtonEl.setAttribute("data-count", String(pendingCount));
        const sendLabelWithCount = t("composer_send_files", {{ count: pendingCount }});
        sendButtonEl.title = sendLabelWithCount;
        sendButtonEl.setAttribute("aria-label", sendLabelWithCount);
        textEl.placeholder = t("composer_placeholder_optional");
      }} else {{
        sendButtonEl.removeAttribute("data-count");
        const sendLabel = t("composer_send");
        sendButtonEl.title = sendLabel;
        sendButtonEl.setAttribute("aria-label", sendLabel);
        textEl.placeholder = t("composer_placeholder_type");
      }}
      autoSizeTextarea();
      syncComposerSpacer();
    }}

    const basePath = window.location.pathname.replace(/\/+$/g, "").replace(/\/+/g, "/");
    const externalUrl = basePath + "/external?ci=" + encodeURIComponent(CONFIG.ci);
    console.info("[external_chat] externalUrl:", externalUrl);

    async function callApi(action, data) {{
      const resp = await fetch(externalUrl, {{
        method: "POST",
        headers: {{ "Content-Type": "application/json" }},
        body: JSON.stringify({{ action, data }})
      }});
      const payload = await resp.json().catch(() => ({{}}));
      if (!resp.ok) {{
        const message = (
          (payload && payload.result && payload.result.description)
          || (payload && payload.description)
          || ("HTTP " + resp.status)
        );
        const error = new Error(message);
        error.status = resp.status;
        error.payload = payload || {{}};
        throw error;
      }}
      return payload;
    }}
    function applyWriteState(payload) {{
      if (payload && Number(payload.chat_revision) > 0) {{
        state.chatRevision = Number(payload.chat_revision);
      }}
      state.ratingEnabled = !!(payload && payload.rating_enabled === true);
      state.ratingRequired = !!(payload && payload.rating_required === true);
      state.ratingSubmitted = !!(payload && payload.rating_submitted === true);
      state.ticketRating = normalizeRating(payload && payload.ticket_rating);
      state.ratingMessage = String((payload && payload.rating_message) || "");
      state.ticketClosed = !!(payload && payload.ticket_closed === true);
      renderRatingPanel();
      updateComposerState();
    }}

    function delayMs(ms) {{
      const timeout = Math.max(Number(ms || 0), 0);
      return new Promise((resolve) => {{
        window.setTimeout(resolve, timeout);
      }});
    }}

    let eventLoopRunning = false;
    let eventLoopBackoffMs = 1000;
    let eventLoopTickTs = 0;
    let eventLoopWatchdogId = 0;
    const EVENT_POLL_INTERVAL_MS = 3000;

    function safeUpdateComposerState() {{
      try {{
        updateComposerState();
      }} catch (error) {{
        console.error("[external_chat] updateComposerState failed:", error);
      }}
    }}

    async function runEventLoop() {{
      if (eventLoopRunning) {{
        return;
      }}
      eventLoopRunning = true;
      try {{
        while (eventLoopRunning) {{
          eventLoopTickTs = Date.now();
          try {{
            if (isOnboardingRequired()) {{
              if (!historyEl.querySelector(".onboarding-card")) {{
                renderOnboarding();
              }}
              safeUpdateComposerState();
              await delayMs(800);
              continue;
            }}

            if (!state.chatReady) {{
              try {{
                await initChat();
                eventLoopBackoffMs = 1000;
              }} catch (error) {{
                state.chatReady = false;
                handleActionError(error);
                await delayMs(eventLoopBackoffMs);
                eventLoopBackoffMs = Math.min(eventLoopBackoffMs * 2, 10000);
              }}
              safeUpdateComposerState();
              continue;
            }}

            try {{
              const result = await callApi("getupdates", {{
                visitor_id: state.visitorId,
                display_name: state.profile.display_name,
                email: state.profile.email,
                phone: state.profile.phone,
                known_revision: state.chatRevision,
                max_events: 20,
              }});
              applyWriteState(result);
              const events = Array.isArray(result && result.events) ? result.events : [];
              let shouldRefreshHistory = false;
              let forceFullHistory = false;
              for (const event of events) {{
                const apiAction = String((event && event.api_action) || "").trim().toLowerCase();
                if (apiAction === "history") {{
                  shouldRefreshHistory = true;
                  forceFullHistory = forceFullHistory || !!(event && event.force_full === true);
                }}
              }}
              if (shouldRefreshHistory) {{
                await refreshHistory(forceFullHistory);
              }}
              await delayMs(EVENT_POLL_INTERVAL_MS);
              eventLoopBackoffMs = 1000;
            }} catch (error) {{
              handleActionError(error);
              await delayMs(eventLoopBackoffMs);
              eventLoopBackoffMs = Math.min(eventLoopBackoffMs * 2, 10000);
            }}
            safeUpdateComposerState();
          }} catch (loopError) {{
            console.error("[external_chat] event loop iteration failed:", loopError);
            await delayMs(eventLoopBackoffMs);
            eventLoopBackoffMs = Math.min(eventLoopBackoffMs * 2, 10000);
            safeUpdateComposerState();
          }}
        }}
      }} finally {{
        eventLoopRunning = false;
      }}
    }}

    function ensureEventLoopAlive() {{
      const nowTs = Date.now();
      if (!eventLoopRunning) {{
        runEventLoop().catch((error) => {{
          console.error("[external_chat] event loop restart failed:", error);
        }});
        return;
      }}
      if (eventLoopTickTs > 0 && (nowTs - eventLoopTickTs) > 90000) {{
        console.warn("[external_chat] event loop watchdog restart");
        eventLoopRunning = false;
        runEventLoop().catch((error) => {{
          console.error("[external_chat] event loop watchdog restart failed:", error);
        }});
      }}
    }}

    async function initChat() {{
      if (state.chatReady) {{
        return;
      }}
      const missing = getMissingRequiredFields();
      if (missing.length) {{
        setStatus(t("status_fill_required_fields"), "warning");
        renderOnboarding();
        updateComposerState();
        return;
      }}
      setStatus(t("status_connecting"), "pending");
      const result = await callApi("init", {{
        visitor_id: state.visitorId,
        display_name: state.profile.display_name,
        email: state.profile.email,
        phone: state.profile.phone
      }});
      if (result.visitor_id && result.visitor_id !== state.visitorId) {{
        state.visitorId = normalizeVisitorId(result.visitor_id);
        storageSet(CONFIG.visitorKey, state.visitorId);
      }}
      state.chatReady = true;
      state.onboardingErrors = {{}};
      applyWriteState(result);
      renderHistory(result.history || [], true);
      setStatus(t("status_online"), "ok");
    }}

    async function refreshHistory(forceFull = false) {{
      if (!state.chatReady) {{
        return;
      }}
      const result = await callApi("history", {{
        visitor_id: state.visitorId,
        display_name: state.profile.display_name,
        email: state.profile.email,
        phone: state.profile.phone,
        known_revision: state.chatRevision,
        force_full: !!forceFull,
        limit: {ExternalChatCrmChannelConfig.DEFAULT_HISTORY_LIMIT}
      }});
      applyWriteState(result);
      if (result.history_changed !== false) {{
        renderHistory(result.history || []);
      }}
      setStatus(t("status_online"), "ok");
    }}
    async function sendChatMessage(text) {{
      if (!state.chatReady) {{
        await initChat();
      }}
      if (!state.chatReady) {{
        return;
      }}
      const normalizedText = String(text || "").trim();
      if (!normalizedText) {{
        return;
      }}
      const result = await callApi("send_message", {{
        visitor_id: state.visitorId,
        text: normalizedText,
        display_name: state.profile.display_name,
        email: state.profile.email,
        phone: state.profile.phone
      }});
      applyWriteState(result);
      await refreshHistory(true);
    }}
    async function buildUploadPayload(pendingFile) {{
      if (!pendingFile || !pendingFile.file) {{
        throw new Error(t("error_file_read_failed"));
      }}
      const dataUrl = await readFileAsDataURL(pendingFile.file);
      const base64Payload = String(dataUrl || "").split(",", 2)[1] || "";
      if (!base64Payload) {{
        throw new Error(t("error_file_read_failed"));
      }}
      return {{
        name: pendingFile.name || "file.bin",
        extension: pendingFile.extension || "bin",
        data: base64Payload,
      }};
    }}
    async function sendChatFile(payload, options = {{}}) {{
      if (!payload) {{
        return;
      }}
      const refresh = options.refresh !== false;
      if (!state.chatReady) {{
        await initChat();
      }}
      if (!state.chatReady) {{
        return;
      }}
      const result = await callApi("send_file", {{
        visitor_id: state.visitorId,
        text: String(payload.text || "").trim(),
        file_name: payload.name,
        extension: payload.extension,
        data: payload.data,
        display_name: state.profile.display_name,
        email: state.profile.email,
        phone: state.profile.phone
      }});
      applyWriteState(result);
      if (refresh) {{
        await refreshHistory(true);
      }}
    }}
    async function sendPendingFilesQueue(text) {{
      const pendingFiles = Array.isArray(state.pendingFiles) ? state.pendingFiles : [];
      if (!pendingFiles.length) {{
        return 0;
      }}
      let caption = String(text || "").trim();
      let sentCount = 0;
      const total = pendingFiles.length;
      while (state.pendingFiles.length > 0) {{
        const pending = state.pendingFiles[0];
        setStatus(t("status_sending_files_progress", {{
          current: sentCount + 1,
          total: total,
        }}), "pending");
        const upload = await buildUploadPayload(pending);
        await sendChatFile({{
          text: caption,
          name: upload.name,
          extension: upload.extension,
          data: upload.data,
        }}, {{ refresh: false }});
        caption = "";
        revokePendingPreview(pending);
        state.pendingFiles.shift();
        sentCount += 1;
      }}
      fileInputEl.value = "";
      if (sentCount > 0) {{
        await refreshHistory(true);
        setStatus(t("status_files_sent", {{ count: sentCount }}), "ok");
      }}
      return sentCount;
    }}
    function handleActionError(error) {{
      const payload = error && error.payload ? error.payload : {{}};
      const hasTicketState =
        payload
        && (Object.prototype.hasOwnProperty.call(payload, "ticket_closed")
          || Object.prototype.hasOwnProperty.call(payload, "can_write")
          || Object.prototype.hasOwnProperty.call(payload, "rating_enabled"));
      if (hasTicketState) {{
        applyWriteState(payload);
      }}
      setStatus(t("status_error_prefix") + (error && error.message ? error.message : t("error_unexpected")), "error");
    }}

    formEl.addEventListener("submit", async (event) => {{
      event.preventDefault();
      closeEmojiPanel();
      if (isOnboardingRequired() || state.onboardingSubmitBusy) {{
        return;
      }}
      const text = (textEl.value || "").trim();
      const pendingCount = Array.isArray(state.pendingFiles) ? state.pendingFiles.length : 0;
      if (!text && pendingCount === 0) {{
        return;
      }}
      try {{
        state.fileReading = true;
        sendButtonEl.disabled = true;
        if (pendingCount > 0) {{
          await sendPendingFilesQueue(text);
        }} else {{
          await sendChatMessage(text);
        }}
        textEl.value = "";
        autoSizeTextarea();
      }} catch (error) {{
        handleActionError(error);
      }} finally {{
        state.fileReading = false;
        updateComposerState();
      }}
    }});
    if (languageSelectEl) {{
      languageSelectEl.addEventListener("change", () => {{
        setLanguage(languageSelectEl.value, true);
      }});
    }}
    attachButtonEl.addEventListener("click", () => {{
      if (attachButtonEl.disabled || state.fileReading) {{
        return;
      }}
      closeEmojiPanel();
      fileInputEl.click();
    }});
    for (const button of formatButtons) {{
      button.addEventListener("click", () => {{
        const action = String((button && button.dataset && button.dataset.format) || "");
        closeEmojiPanel();
        applyComposerTool(action);
      }});
    }}
    if (emojiButtonEl) {{
      emojiButtonEl.addEventListener("click", (event) => {{
        event.preventDefault();
        event.stopPropagation();
        toggleEmojiPanel();
      }});
    }}
    document.addEventListener("click", (event) => {{
      if (!emojiPanelEl || emojiPanelEl.hidden) {{
        return;
      }}
      const target = event.target;
      const clickedInsidePanel = !!(target && target.closest && target.closest("#emojiPanel"));
      const clickedToggle = !!(target && target.closest && target.closest("#emojiButton"));
      if (!clickedInsidePanel && !clickedToggle) {{
        closeEmojiPanel();
      }}
    }});
    document.addEventListener("keydown", (event) => {{
      if (event.key === "Escape") {{
        closeEmojiPanel();
      }}
    }});
    fileInputEl.addEventListener("change", async () => {{
      const files = Array.from(fileInputEl.files || []);
      if (!files.length) {{
        return;
      }}
      const maxUploadBytes = Number(CONFIG.maxUploadBytes || 0);
      let addedCount = 0;
      let skippedCount = 0;
      for (const file of files) {{
        if (maxUploadBytes > 0 && Number(file.size || 0) > maxUploadBytes) {{
          skippedCount += 1;
          continue;
        }}
        queuePendingFile(file);
        addedCount += 1;
      }}
      if (addedCount > 0 && skippedCount > 0) {{
        setStatus(t("status_files_attached_partial", {{ added: addedCount, skipped: skippedCount }}), "warning");
      }} else if (addedCount > 0) {{
        setStatus(t("status_files_attached", {{ count: addedCount }}), "ok");
      }} else if (skippedCount > 0) {{
        setStatus(t("status_file_too_large", {{ max: formatBytes(maxUploadBytes) }}), "warning");
      }}
      fileInputEl.value = "";
      updateComposerState();
    }});
    textEl.addEventListener("input", () => {{
      autoSizeTextarea();
      scheduleViewportCssUpdate(0);
    }});
    textEl.addEventListener("focus", () => {{
      scheduleViewportCssUpdate(70);
      window.setTimeout(() => {{
        keepComposerVisibleOnMobile();
      }}, 90);
    }});
    textEl.addEventListener("blur", () => {{
      scheduleViewportCssUpdate(140);
    }});
    textEl.addEventListener("keydown", (event) => {{
      if (event.key !== "Enter") {{
        return;
      }}
      if (event.shiftKey || event.ctrlKey || event.metaKey || event.altKey || event.isComposing) {{
        return;
      }}
      event.preventDefault();
      formEl.requestSubmit();
    }});

    async function bootstrapChat() {{
      if (!window.fetch) {{
        throw new Error(t("error_fetch_unavailable"));
      }}

      initLanguage();
      setStatus(t("status_initializing"), "pending");
      bindViewportHandlers();
      renderComposerToolLabels();
      loadProfile();
      applyQueryProfileOverrides();
      persistProfile();
      initVisitorId();
      updateComposerState();
      autoSizeTextarea();

      if (isOnboardingRequired()) {{
        renderOnboarding();
        setStatus(t("status_fill_required_fields"), "warning");
      }} else {{
        try {{
          await initChat();
        }} catch (error) {{
          state.chatReady = false;
          handleActionError(error);
        }}
      }}
      runEventLoop();
      if (!eventLoopWatchdogId) {{
        eventLoopWatchdogId = window.setInterval(ensureEventLoopAlive, 15000);
      }}
      updateComposerState();
    }}

    bootstrapChat().catch((error) => {{
      state.chatReady = false;
      setStatus(t("status_startup_error"), "error");
      console.error("[external_chat] bootstrap failed:", error);
      handleActionError(error);
      updateComposerState();
    }});
  </script>
</body>
</html>
